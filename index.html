<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- user-scalable=no + maximum-scale=1 kill iOS double-tap/pinch zoom on the
         letterbox; viewport-fit=cover lets the dark background run under notches
         (the FIT letterbox gutters are where the notch sits in landscape). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d0a14" />
    <!-- Favicon set derived from the in-game card-back art (public/assets/art/
         scenes/card-back.png), centre-cropped to its gold diamond emblem. All
         hrefs are relative (no leading slash) so they resolve under the GitHub
         Pages project subpath, Tauri's custom protocol, and local dev alike —
         a leading-slash "/favicon.ico" would 404 at the Pages domain root. The
         .ico (16/32/48) is the universal fallback; the PNGs give crisp modern
         tabs; apple-touch-icon covers iOS home-screen. -->
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <title>Darling Blades</title>
    <style>
      /* Self-hosted webfonts: a phone joining over LAN has no route to Google's
         CDN, which used to silently fall back to system serif. Both files are
         variable fonts, so one face per family covers every weight in use
         (Cinzel 500/700, Inter 400/600). Latin subset only — non-latin glyphs
         fall back to the per-Text font stacks (Georgia/Arial). */
      @font-face {
        font-family: 'Cinzel';
        font-style: normal;
        font-weight: 400 900;
        font-display: swap;
        src: url('assets/fonts/cinzel-latin-var.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('assets/fonts/inter-latin-var.woff2') format('woff2');
      }
      /* Browser-chrome reserve for touch landscape (see the #app media query).
         These are the two knobs to tune on a real device: raise if the top or
         bottom bar still overlaps the board, lower if it leaves too big a gap. */
      :root {
        --chrome-top: 32px;
        --chrome-bottom: 48px;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0d0a14;
        /* dvh (with % fallback for old browsers): the layout viewport tracks the
           collapsing address bar instead of re-letterboxing mid-play. */
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        /* Kill pull-to-refresh / rubber-banding from the letterbox gutters —
           Phaser only preventDefaults touches on the canvas itself. */
        overscroll-behavior: none;
      }
      body {
        /* Positioned so #app's absolute inset is measured against the 100dvh
           body box (keeps the dvh address-bar behavior below). */
        position: relative;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      /* The Phaser canvas mounts here. Absolutely filling the (100dvh) body lets
         the touch inset below carve out the browser-chrome band while Phaser
         still just sees a smaller parent to Scale.FIT into. */
      #app {
        position: absolute;
        inset: 0;
      }
      /* Reserve space for the on-screen browser chrome (Safari's address bar and
         bottom toolbar) on touch devices in landscape, so the board's edge UI —
         the opponent strip up top, the commander portrait + End Turn / Confirm
         controls along the bottom — never renders under a bar. Scale.FIT shrinks
         the 1280×720 board into the inset region and CENTER_BOTH re-centers it;
         the reserved band is the page's own dark background, seamless under the
         (also dark) Safari bars. env() additionally clears the notch / Dynamic
         Island / home indicator. Desktop (fine pointer) and portrait (the rotate
         overlay covers it) never match, so both stay exactly as before. */
      @media (pointer: coarse) and (orientation: landscape) {
        #app {
          top: max(env(safe-area-inset-top), var(--chrome-top));
          right: env(safe-area-inset-right);
          bottom: max(env(safe-area-inset-bottom), var(--chrome-bottom));
          left: env(safe-area-inset-left);
        }
      }
      /* Landscape-only: portrait FIT renders the game at ~0.31 scale (unusable),
         so a pure DOM/CSS overlay blocks it on touch devices. The media query
         re-evaluates on rotation — no JS, no Phaser involvement. Desktop
         (fine pointer) never matches, however the window is shaped. */
      #rotate-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: #0d0a14;
        color: #c9bde0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        font-family: Georgia, serif;
        text-align: center;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      }
      #rotate-overlay svg {
        width: 72px;
        height: 72px;
        animation: rotate-hint 2.2s ease-in-out infinite;
      }
      #rotate-overlay .title {
        font-size: 22px;
      }
      #rotate-overlay .sub {
        font-size: 14px;
        color: #8f83a8;
      }
      @keyframes rotate-hint {
        0%,
        20% {
          transform: rotate(0deg);
        }
        55%,
        100% {
          transform: rotate(-90deg);
        }
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-overlay {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="rotate-overlay" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c9bde0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="3" width="10" height="18" rx="2" />
        <circle cx="12" cy="17.5" r="0.8" fill="#c9bde0" />
      </svg>
      <div class="title">Rotate your device</div>
      <div class="sub">Darling Blades plays in landscape</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
